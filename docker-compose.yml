services:
  postgres:
    image: postgres:16-alpine
    container_name: studysync-postgres
    environment:
      POSTGRES_USER: studysync
      POSTGRES_PASSWORD: studysync_dev
      POSTGRES_DB: identity_db
    ports:
      - "5442:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U studysync -d identity_db"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - studysync

  postgres_group:
    image: postgres:16-alpine
    container_name: studysync-postgres-group
    environment:
      POSTGRES_USER: studysync
      POSTGRES_PASSWORD: studysync_dev
      POSTGRES_DB: group_db
    ports:
      - "5443:5432"
    volumes:
      - postgres_group_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U studysync -d group_db"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - studysync

  redis:
    image: redis:7-alpine
    container_name: studysync-redis
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - studysync

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: studysync-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
    healthcheck:
      test: ["CMD", "bash", "-c", "echo ruok | timeout 2 nc localhost 2181 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - studysync

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: studysync-kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_HEAP_OPTS: -Xms256m -Xmx256m
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092 > /dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks:
      - studysync

  mongo:
    image: mongo:7
    container_name: studysync-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - studysync

  identity_service:
    build: ./identity_service
    container_name: studysync-identity
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    env_file:
      - ./identity_service/.env
    networks:
      - studysync

  session_service:
    build: ./session_service
    container_name: studysync-session
    ports:
      - "8001:8001"
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    env_file:
      - ./session_service/.env
    networks:
      - studysync

  group_service:
    build: ./group_service
    container_name: studysync-group
    ports:
      - "8002:8002"
    depends_on:
      postgres_group:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    env_file:
      - ./group_service/.env
    networks:
      - studysync

  chat_service:
    build: ./chat_service
    container_name: studysync-chat
    ports:
      - "8003:8003"
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      group_service:
        condition: service_started
    env_file:
      - ./chat_service/.env
    networks:
      - studysync

volumes:
  postgres_data:
  postgres_group_data:
  redis_data:
  zookeeper_data:
  kafka_data:
  mongo_data:

networks:
  studysync:
    driver: bridge
